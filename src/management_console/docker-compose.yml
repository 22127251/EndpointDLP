services:
  db:
    image: postgres:18-alpine
    container_name: dlp_db_container
    restart: always
    environment:
      - POSTGRES_PASSWORD=22127475
      - POSTGRES_DB=dlpserver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    # networks:
    #   - dlp_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      tags:
        - latest
    container_name: dlp_backend_container
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:22127475@db:5432/dlpserver
    # networks:
    #   - dlp_network

volumes:
  postgres_data:

networks:
  dlp_network:
    driver: bridge
