policies:

  # --- Generic PII ---

  - id: cc_numbers
    name: Credit Card Numbers
    channels: [clipboard, browser, peripheral]
    action: block
    type: regex
    patterns:
      - "\\b4[0-9]{12}(?:[0-9]{3})?\\b"          # Visa
      - "\\b5[1-5][0-9]{14}\\b"                   # Mastercard
      - "\\b3[47][0-9]{13}\\b"                    # Amex
    context_words:
      - "credit card"
      - "thẻ tín dụng"
      - "card number"
      - "số thẻ"
      - "thẻ"
      - "visa"
      - "mastercard"
      - "amex"
    context_range: 120

  # --- Vietnamese PII ---

  - id: vn_cccd
    name: Vietnamese Citizen ID (CCCD / CMND)
    channels: [clipboard, browser, peripheral]
    action: block
    type: regex
    patterns:
      # CCCD 12 digits: province (0XX, 001-096) + gender/century digit (0-3) + birth year (2 digits) + sequence (6 digits)
      - "\\b0[0-9]{2}[0-3][0-9]{8}\\b"
    context_words:
      - "CCCD"
      - "căn cước"
      - "căn cước công dân"
      - "chứng minh nhân dân"
      - "CMND"
      - "số định danh"
      - "định danh cá nhân"
    context_range: 200

  - id: vn_bhxh
    name: Vietnamese Social / Health Insurance Number (BHXH / BHYT)
    channels: [clipboard, browser, peripheral]
    action: block
    type: regex
    patterns:
      - "\\b[0-9]{10}\\b"
    context_words:
      - "BHXH"
      - "BHYT"
      - "bảo hiểm xã hội"
      - "bảo hiểm y tế"
      - "mã số BHXH"
      - "sổ BHXH"
      - "mã BHYT"
    context_range: 100

  - id: vn_tax_code
    name: Vietnamese Tax Code (Mã số thuế)
    channels: [clipboard, browser, peripheral]
    action: block
    type: regex
    patterns:
      - "\\b[0-9]{10}\\b"                         # 10-digit individual/company code
      - "\\b[0-9]{10}-[0-9]{3}\\b"                # 13-digit subsidiary code (XXXXXXXXXX-XXX)
    context_words:
      - "mã số thuế"
      - "MST"
      - "mã thuế"
      - "tax code"
      - "mã số doanh nghiệp"
      - "tax identification"
    context_range: 100

  # --- Keyword-based ---

  - id: confidential_keywords
    name: Confidential Keywords
    channels: [clipboard, browser, peripheral]
    action: block
    type: denylist
    keywords:
      - "confidential"
      - "top secret"
      - "strictly confidential"
      - "mật"
      - "bí mật"
      - "tuyệt mật"
      - "nội bộ"
    context_words: []
    context_range: 0
