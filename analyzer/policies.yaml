policies:

  # --- Chặn đưa thẻ VISA ở cả 3 kênh ---
  - id: block_visa_all_channels_with_context
    name: Block Visa Card in on all channels with Context
    channels: [browser, clipboard, peripheral_storage]
    action: block
    type: regex
    patterns:
      - "\\b4[0-9]{3}(?:\\s?[0-9]{4}){3}\\b"      # Định dạng thẻ Visa (16 số, nhóm 4, có thể cách nhau bằng khoảng trắng)
    context_words:
      - "credit card"
      - "thẻ tín dụng"
      - "card number"
      - "số thẻ"
      - "thẻ"
      - "visa"
    context_range: 120

  # --- Chặn đưa CCCD ở cả 3 kênh ---
  - id: block_cccd_all_channels_with_context
    name: Block Vietnamese Citizen ID (CCCD) in on all channels with Context
    channels: [browser, clipboard, peripheral_storage]
    action: block
    type: regex
    patterns:
      # CCCD 12 số: mã tỉnh/thành + thế kỷ/giới tính + năm sinh + số ngẫu nhiên
      - "\\b0[0-9]{2}[0-3][0-9]{8}\\b"
    context_words:
      - "CCCD"
      - "căn cước"
      - "căn cước công dân"
      - "chứng minh nhân dân"
      - "CMND"
      - "số định danh"
      - "định danh cá nhân"
    context_range: 200

# --- Chặn đưa CCCD vào Clipboard mà không có từ khóa ngữ cảnh ---
  - id: block_cccd_clipboard_no_context
    name: Block Vietnamese Citizen ID (CCCD) in Clipboard with no Context words
    channels: [clipboard]
    action: block
    type: regex
    patterns:
      # CCCD 12 số: mã tỉnh/thành + thế kỷ/giới tính + năm sinh + số ngẫu nhiên
      - "\\b0[0-9]{2}[0-3][0-9]{8}\\b"


