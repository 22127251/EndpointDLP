  # --- Cho phép và Ghi Log (Allow & Log) Số điện thoại ở cả 3 kênh ---
  - id: log_phone_numbers_browser
    name: Log Phone Numbers in Browser
    channels: [browser, clipboard, peripheral_storage]
    action: allow_log
    type: regex
    patterns:
      # Định dạng số điện thoại Việt Nam (10 số, bắt đầu bằng 03, 05, 07, 08, 09 hoặc +84)
      - "\\b0[35789][0-9]{8}\\b"
      - "\\+84[35789][0-9]{8}\\b"
    context_words:
      - "số điện thoại"
      - "sđt"
      - "phone"
      - "tel"
      - "liên hệ"
      - "hotline"
    context_range: 100