policies:

  # === Confidence-scoring model ============================================
  # Every shape match is detected + counted (verify.py-equivalent recall).
  # Context only RAISES the score; it never drops a match. Defaults are the same
  # for every policy: score_base 0.5, score_context_boost 0.5 → two clean bands:
  # no-context = 0.5, has-context = 1.0. `actions` (the ONLY action field) maps
  # score → action; admins retune thresholds (e.g. set the block floor to 0.5 to
  # block even bare values). Each match records WHICH context word boosted it.
  # =========================================================================

  # --- Thẻ VISA: có ngữ cảnh → BLOCK, chỉ đúng định dạng → ghi log ---
  - id: block_visa_all_channels
    name: Block Visa Card (confidence-scored)
    channels: [browser, clipboard, peripheral_storage]
    type: regex
    patterns:
      # Thẻ Visa 16 số bắt đầu bằng 4, nhóm 4 số, khoảng trắng tùy chọn (khớp verify.py)
      - "\\b4\\d{3} ?\\d{4} ?\\d{4} ?\\d{4}\\b"
    context_words:
      - "credit card"
      - "thẻ tín dụng"
      - "card number"
      - "số thẻ"
      - "thẻ"
      - "visa"
    context_range: 120
    score_base: 0.5
    score_context_boost: 0.5
    actions:
      - { min_score: 1.0, action: block }       # định dạng + ngữ cảnh → chặn
      - { min_score: 0.0, action: allow_log }    # chỉ đúng định dạng → ghi log

  # --- CCCD: có ngữ cảnh → BLOCK, chỉ đúng định dạng → ghi log ---
  #     (gộp cả bản "clipboard không cần ngữ cảnh" cũ: nay là dải điểm no-context)
  - id: block_cccd_all_channels
    name: Block Vietnamese Citizen ID CCCD (confidence-scored)
    channels: [browser, clipboard, peripheral_storage]
    type: regex
    patterns:
      # CCCD: chuỗi đúng 12 chữ số (khớp verify.py)
      - "\\b\\d{12}\\b"
    context_words:
      - "CCCD"
      - "căn cước"
      - "căn cước công dân"
      - "chứng minh nhân dân"
      - "CMND"
      - "số định danh"
      - "định danh cá nhân"
    context_range: 200
    score_base: 0.5
    score_context_boost: 0.5
    actions:
      - { min_score: 1.0, action: block }
      - { min_score: 0.0, action: allow_log }

  # --- Số điện thoại: chính sách giám sát → luôn allow_log (context_word vẫn ghi nhận) ---
  - id: log_phone_numbers
    name: Log Phone Numbers (confidence-scored)
    channels: [browser, clipboard, peripheral_storage]
    type: regex
    patterns:
      # Số điện thoại Việt Nam, 3 dạng khớp verify.py:
      - "\\b0\\d{2} \\d{3} \\d{4}\\b"   # nhóm cách: 096 123 4567
      - "\\+84\\d{9}\\b"               # quốc tế:  +84961234567
      - "\\b0\\d{9}\\b"                # liền:     0961234567
    context_words:
      - "số điện thoại"
      - "sđt"
      - "phone"
      - "tel"
      - "liên hệ"
      - "hotline"
    context_range: 100
    score_base: 0.5
    score_context_boost: 0.5
    actions:
      - { min_score: 0.0, action: allow_log }    # luôn ghi log

  # --- Từ khóa Bí mật / Nội bộ (denylist, khớp NGUYÊN TỪ) ---
  #     Denylist cũng dùng được ngữ cảnh: gần một context_word → điểm cao hơn → chặn.
  #     context_words dưới đây chỉ là VÍ DỤ minh họa, admin tự điều chỉnh.
  - id: block_confidential_keywords
    name: Block Confidential Keywords (confidence-scored)
    channels: [browser, peripheral_storage]
    type: denylist
    keywords:
      - "mật"
      - "bí mật"
      - "tuyệt mật"
      - "nội bộ"
      - "confidential"
      - "top secret"
      - "strictly confidential"
    context_words:                      # VÍ DỤ: từ khóa gần các từ này → coi là tài liệu mật thật
      - "tài liệu"
      - "văn bản"
      - "phân loại"
      - "đóng dấu"
    context_range: 120
    score_base: 0.5
    score_context_boost: 0.5
    actions:
      - { min_score: 1.0, action: block }       # từ khóa + ngữ cảnh → chặn
      - { min_score: 0.0, action: allow_log }    # chỉ từ khóa → ghi log
