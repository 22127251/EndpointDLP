policies:

  # --- Chặn đưa thẻ VISA vào Browser ---
  - id: block_visa_browser
    name: Block Visa Card in Browser
    channels: [browser, clipboard]
    action: block
    type: regex
    patterns:
      - "\\b4[0-9]{12}(?:[0-9]{3})?\\b"          # Định dạng thẻ Visa
    context_words:
      - "credit card"
      - "thẻ tín dụng"
      - "card number"
      - "số thẻ"
      - "thẻ"
      - "visa"
    context_range: 120

  # --- Chặn đưa CCCD vào Browser ---
  - id: block_cccd_browser
    name: Block Vietnamese Citizen ID (CCCD) in Browser
    channels: [browser, clipboard]
    action: block
    type: regex
    patterns:
      # CCCD 12 số: mã tỉnh/thành + thế kỷ/giới tính + năm sinh + số ngẫu nhiên
      - "\\b0[0-9]{2}[0-3][0-9]{8}\\b"
    context_words:
      - "CCCD"
      - "căn cước"
      - "căn cước công dân"
      - "chứng minh nhân dân"
      - "CMND"
      - "số định danh"
      - "định danh cá nhân"
    context_range: 200

  # --- Chặn từ khóa liên quan đến Bí mật / Nội bộ vào Browser ---
  - id: block_confidential_keywords_browser
    name: Block Confidential Keywords in Browser
    channels: [browser, clipboard]
    action: block
    type: denylist
    keywords:
      - "mật"
      - "bí mật"
      - "tuyệt mật"
      - "nội bộ"
      - "confidential"
      - "top secret"
      - "strictly confidential"
    context_words: []
    context_range: 0

  # --- Cho phép và Ghi Log (Allow & Log) Số điện thoại vào Browser ---
  - id: log_phone_numbers_browser
    name: Log Phone Numbers in Browser
    channels: [browser, clipboard]
    action: allow_with_log  # Hoặc 'log' / 'audit' tùy thuộc vào engine DLP thực tế của bạn
    type: regex
    patterns:
      # Định dạng số điện thoại Việt Nam (10 số, bắt đầu bằng 03, 05, 07, 08, 09 hoặc +84)
      - "\\b0[35789][0-9]{8}\\b"
      - "\\+84[35789][0-9]{8}\\b"
    context_words:
      - "số điện thoại"
      - "sđt"
      - "phone"
      - "tel"
      - "liên hệ"
      - "hotline"
    context_range: 100