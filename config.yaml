# Source of truth for all non-policy DLP config.
# Policy rules live in analyzer/policies.yaml (intentionally separate).

# ── Shared infrastructure (consumed by orchestrator AND every client) ──
data_pipe: "\\\\.\\pipe\\dlp_agen"
ctl_pipe:  "\\\\.\\pipe\\dlp_agent_ctl"

# ── Orchestrator-only ──
pools:
  clipboard_workers:          2
  browser_workers:            3
  peripheral_storage_workers: 2
  pipe_listeners:             4

limits:
  max_clipboard_bytes: 1048576       # 1 MB
  max_file_bytes:      104857600     # 100 MB (browser)

supervisor:                          # Consumed in Phase C; harmless to keep now.
  max_restarts: 3
  restart_window_seconds: 60
  stable_uptime_reset_seconds: 60

paths:                               # Phase D will add transfer_agent_exe / shell_extension_dll.
  mitmdump_exe: ""                   # auto-detect in venv if empty
  addon_script: "interceptors/browser/addon.py"
  clipboard_exe: "src/ClipboardInterceptor/bin/Debug/net10.0-windows/ClipboardInterceptor.exe"
  controller_exe: "interceptors/peripheral_storage/Controller/bin/Debug/net10.0-windows/win-x64/UsbDlpController.exe"
  log_dir: ""                        # empty → %PROGRAMDATA%\DLP\logs

proxy:
  listen_port: 8080
  bypass: "localhost;127.0.0.1;<local>"

policies_file: "analyzer/policies.yaml"

# ── Per-component sections (each component reads ONLY its own subtree) ──

clipboard:
  pipe_timeout_ms: 6000              # was hardcoded in PipeAgentCore.cs:13

browser:                             # All fields migrated from interceptors/browser/config.yaml.
  pipe_timeout_seconds: 5
  fail_behavior: "open"             # "allow" | "block" on pipe error
  temp_dir: "D:\\Code\\GithubPublishEndpointDLP\\tmp"   # empty → system %TEMP%
  min_upload_size_bytes: 1024

  # Domains to skip unconditionally (analytics, telemetry, logging)
  domain_blocklist:
    - google-analytics.com
    - analytics.google.com
    - beacons.gcp.gvt2.com
    - beacons.gvt2.com
    - beacons3.gvt2.com
    - ssl.gstatic.com

  # URL path/query keywords that signal a real upload endpoint.
  upload_url_keywords:
    - upload
    - attach
    - import

  # File type allow-list. Leave both lists empty to inspect everything.
  extensions:
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
    - .ppt
    - .pptx
    - .odt
    - .ods
    - .odp
    - .zip
    - .rar
    - .7z
    - .tar
    - .gz
    - .csv
    - .txt

  mime_types:
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - application/vnd.ms-powerpoint
    - application/vnd.openxmlformats-officedocument.presentationml.presentation
    - application/vnd.oasis.opendocument.text
    - application/vnd.oasis.opendocument.spreadsheet
    - application/vnd.oasis.opendocument.presentation
    - application/zip
    - application/x-rar-compressed
    - application/x-7z-compressed
    - application/x-tar
    - application/gzip
    - text/plain
    - text/csv

peripheral_storage:                  # Controller reads this whole subtree.
  target_processes:
    - explorer.exe

  # Behavior when shared memory is unavailable or cannot be read inside the hook.
  # "open"   (default) — allow the file operation through
  # "closed" — block all removable-drive writes when unsure
  fail_mode: open

  shared_memory_name: UsbDlpDriveMap # NOT hot-reloadable (see config_watcher in __main__.py)
  payload_dll_path: Payload.dll      # relative → resolved against Controller.exe dir

  transfer_agent:                    # TransferAgent reads only this nested subtree.
    connect_timeout_ms: 5000         # was hardcoded in OrchestratorClient.cs:24
    analysis_timeout_seconds: 10     # was hardcoded in OrchestratorClient.cs:25
