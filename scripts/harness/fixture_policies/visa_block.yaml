policies:
  - id: block_visa_no_context
    name: Block Visa (test fixture)
    channels: [browser, clipboard, peripheral_storage]
    type: regex
    patterns:
      - "\\b4[0-9]{3}(?:\\s?[0-9]{4}){3}\\b"
    context_words: []
    context_range: 0
    score_base: 1.0          # no context_words → always full score
    actions:
      - { min_score: 0.0, action: block }
