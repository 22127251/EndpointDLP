target_processes:
  - explorer.exe
  # IMPORTANT: Never add DlpTransferAgent.exe here.
  # The transfer agent must remain un-hooked so its File.Copy() calls can
  # reach removable drives. Hooking it would cause every sanctioned transfer
  # to be blocked by the same NtCreateFile hook it exists to work around.

# Behavior when shared memory is unavailable or cannot be read inside the hook.
# "open"   (default) — allow the file operation through
# "closed" — block all removable-drive writes when unsure
fail_mode: open

shared_memory_name: UsbDlpDriveMap
payload_dll_path: Payload.dll
